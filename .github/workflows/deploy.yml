name: Deploy Attendance System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd backend
        npm ci
        cd ../admin-web
        npm ci

    - name: Run backend tests
      run: |
        cd backend
        npm test

    - name: Run linting
      run: |
        cd backend
        npm run lint

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/attendance-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/attendance-backend:${{ github.sha }}

    - name: Build and push admin-web
      uses: docker/build-push-action@v4
      with:
        context: ./admin-web
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/attendance-admin:latest
          ${{ secrets.DOCKER_USERNAME }}/attendance-admin:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/attendance-system
          docker-compose pull
          docker-compose up -d --remove-orphans
          docker system prune -f
